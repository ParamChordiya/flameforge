# FlameForge default hyperparameters.
#
# These mirror flameforge.constants.DEFAULT_HYPERPARAMS and are the values the
# TUI starts from before auto-tuning. Pass a modified copy with
# `flameforge --config my.yaml` (loaded via TrainingConfig.from_yaml).

# Training schedule
num_epochs: 3
learning_rate: 2.0e-4
lr_scheduler: cosine
warmup_ratio: 0.03
weight_decay: 0.01
max_seq_length: 2048

# LoRA / DoRA adapter
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules: auto

# Data
train_eval_split: 0.95
shuffle: true
seed: 42

# Optimization
gradient_checkpointing: true
bf16: true            # auto-downgraded to fp16 if the GPU lacks bf16 support
effective_batch_size: 32

# Checkpointing
save_steps: 500
save_total_limit: 3
save_best: true       # keep the checkpoint with the lowest eval loss

# Output
output_dir: ./flameforge-output
